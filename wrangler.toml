name = "my-portfolio"
main = "src/worker.ts"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

# Build configuration
[build]
command = "npm run build"
cwd = "."

# Environment configuration
[env.production]
routes = [
  { pattern = "erai221203.com", zone_name = "erai221203.com" }
]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }

# KV Namespace bindings (optional)
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# Portfolio API configuration
[site]
bucket = "./dist"

[[routes]]
pattern = "*"
zone_name = "erai221203.com"
